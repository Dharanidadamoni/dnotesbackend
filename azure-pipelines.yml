trigger:
- main

variables:
  buildConfiguration: 'Release'

stages:

# ✅ FIRST STAGE (NO dependsOn)
- stage: Build
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - script: dotnet restore dnotes-backend.sln
    - script: dotnet build dnotes-backend.sln --configuration Release
    - script: dotnet publish dnotes-backend.sln --configuration Release --output $(Build.ArtifactStagingDirectory)

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop


# ✅ DEV STAGE
- stage: Dev
  dependsOn: Build
  jobs:
  - deployment: DeployDev
    environment: 'dev'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'dnotesbe'
              appName: 'deathnotes456'
              package: '$(Pipeline.Workspace)/drop'


# ✅ PROD STAGE
- stage: Prod
  dependsOn: Dev
  jobs:
  - deployment: DeployProd
    environment: 'prod'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'dnotesbe'
              appName: 'deathnotes456'
              package: '$(Pipeline.Workspace)/drop'